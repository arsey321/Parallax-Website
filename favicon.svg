<?xml version="1.0" encoding="UTF-8"?>
<!-- Parallax Parfums · adaptive favicon.
     Two overlapping circles (the parallax shift motif) stay legible at 16px,
     where the full logo would be a smudge. Adapts to browser light/dark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .ring { fill: none; stroke: #1a1814; stroke-width: 1.6; }
    @media (prefers-color-scheme: dark) { .ring { stroke: #ede4d2; } }
  </style>
  <circle class="ring" cx="12" cy="16" r="9"/>
  <circle class="ring" cx="20" cy="16" r="9"/>
</svg>
